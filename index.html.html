_volume input[type=range]{flex:1;accent-color:var(--accent)}.toast{position:fixed;bottom:calc(var(--player-height-collapsed) + 1rem);left:50%;transform:translate(-50%) translateY(20px);padding:.75rem 1.25rem;background:#1e1432f2;border:1px solid var(--border);border-radius:10px;color:var(--text);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:30;max-width:90vw;text-align:center}.toast.visible{opacity:1;transform:translate(-50%) translateY(0)}body.player-open .toast{bottom:calc(var(--player-height) + 1rem)}body.player-open.has-youtube .toast{bottom:calc(var(--player-height) + 240px)}.modal{position:fixed;top:0;right:0;bottom:0;left:0;background:#000000a6;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:100}.modal.open{opacity:1;pointer-events:auto}.modal__content{width:min(900px,100%);max-height:90vh;background:#16102a;border:1px solid var(--border);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;box-shadow:var(--shadow)}.modal__header{display:flex;align-items:center;justify-content:space-between;gap:1rem}.modal__header h2{margin:0;font-size:1.35rem}.modal__hint{margin:0;color:var(--text-muted);font-size:.9rem}.modal__table-wrap{overflow:auto;flex:1;border:1px solid rgba(255,255,255,.08);border-radius:10px}.settings-table{width:100%;border-collapse:collapse;font-size:.9rem}.settings-table th,.settings-table td{padding:.5rem .6rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}.settings-table th{position:sticky;top:0;background:#1e1638;color:var(--accent);z-index:1}.settings-table td:first-child{width:3rem;color:var(--text-muted);font-weight:600}.settings-input{width:100%;padding:.45rem .55rem;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#00000040;color:var(--text);font:inherit}.settings-input:focus{outline:2px solid var(--purple);border-color:transparent}.modal__actions{display:flex;flex-wrap:wrap;gap:.6rem}@media(max-width:900px){.board{grid-template-columns:repeat(6,minmax(0,1fr))}body.player-open #app{padding-bottom:180px}body.player-open.has-youtube #app{padding-bottom:380px}body.player-open .player-bar{grid-template-columns:1fr;height:auto;padding:1rem}body.player-open.has-youtube .youtube-panel:not([hidden]){width:calc(100vw - 1.5rem)}#app{padding-bottom:var(--player-height-collapsed)}.player-bar__volume{min-width:0}}@media(max-width:600px){.board{grid-template-columns:repeat(5,minmax(0,1fr));gap:.45rem}.cell{min-height:60px;padding:.35rem .25rem}.cell__number{font-size:1rem}.cell__title{font-size:.62rem}.header__title{font-size:1.35rem}}</style>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header__info">
          <h1 class="header__title">Музыкальное лото</h1>
          <p class="header__subtitle">Сыграно: <span id="played-count">0</span> / 90</p>
        </div>
        <div class="header__actions">
          <button type="button" id="new-game-btn" class="btn btn--secondary">Новая игра</button>
          <button type="button" id="settings-btn" class="btn btn--primary">Настройки песен</button>
        </div>
      </header>

      <main class="main">
        <div id="board" class="board" aria-label="Игровое поле из 90 окошек"></div>
      </main>

      <div id="player-shell" class="player-shell">
        <section id="youtube-panel" class="youtube-panel" hidden aria-label="YouTube-плеер">
          <button type="button" id="youtube-close" class="youtube-panel__close btn btn--icon" aria-label="Закрыть плеер">✕</button>
          <div id="youtube-mount" class="youtube-panel__player"></div>
        </section>

        <footer class="player-bar">
          <div class="player-bar__info">
            <p id="player-title" class="player-bar__title">Выберите окошко</p>
            <div class="player-bar__controls">
              <button type="button" id="play-pause-btn" class="btn btn--icon" aria-label="Воспроизведение">▶</button>
              <button type="button" id="stop-btn" class="btn btn--icon" aria-label="Стоп">⏹</button>
              <button type="button" id="close-player-btn" class="btn btn--icon" aria-label="Закрыть плеер">✕</button>
            </div>
          </div>
          <div class="player-bar__progress">
            <span id="time-current" class="player-bar__time">0:00</span>
            <div id="progress-bar" class="progress" role="slider" aria-label="Прогресс воспроизведения" tabindex="0">
              <div id="progress-fill" class="progress__fill"></div>
            </div>
            <span id="time-total" class="player-bar__time">0:00</span>
          </div>
          <div class="player-bar__volume">
            <label for="volume-slider">🔊</label>
            <input type="range" id="volume-slider" min="0" max="100" value="80" aria-label="Громкость" />
          </div>
        </footer>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>

      <div id="settings-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="settings-title">
        <div class="modal__content">
          <div class="modal__header">
            <h2 id="settings-title">Настройки песен</h2>
            <button type="button" id="settings-close" class="btn btn--icon" aria-label="Закрыть">✕</button>
          </div>
          <p class="modal__hint">
            Укажите название и ссылку на песню: YouTube (youtube.com, youtu.be) или прямой аудиофайл (MP3, OGG, WAV).
          </p>
          <div class="modal__table-wrap">
            <table class="settings-table">
              <thead>
                <tr>
                  <th>№</th>
                  <th>Название</th>
                  <th>URL</th>
                </tr>
              </thead>
              <tbody id="settings-table"></tbody>
            </table>
          </div>
          <div class="modal__actions">
            <button type="button" id="settings-save" class="btn btn--primary">Сохранить</button>
            <button type="button" id="settings-reset" class="btn btn--secondary">Сбросить к умолчанию</button>
            <button type="button" id="settings-import" class="btn btn--secondary">Импорт JSON</button>
            <button type="button" id="settings-export" class="btn btn--secondary">Экспорт JSON</button>
            <input type="file" id="import-input" accept="application/json,.json" hidden />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
